<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="500" fill="#0f0f23" rx="12"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#60a5fa" font-size="20" font-weight="bold">Eve — AI Voice Receptionist Architecture</text>
  
  <!-- Left: Phone Caller -->
  <rect x="40" y="120" width="120" height="80" rx="40" fill="#1e3a5f" filter="url(#shadow)"/>
  <text x="100" y="155" text-anchor="middle" fill="#e2e8f0" font-size="14">📞</text>
  <text x="100" y="178" text-anchor="middle" fill="#94a3b8" font-size="12">Phone Caller</text>
  
  <!-- Arrow: Phone → Twilio -->
  <line x1="160" y1="160" x2="210" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#475569"/>
    </marker>
  </defs>
  
  <!-- Twilio Voice -->
  <rect x="215" y="105" width="140" height="110" rx="12" fill="#1a1a2e" stroke="#f22f46" stroke-width="2" filter="url(#shadow)"/>
  <text x="285" y="138" text-anchor="middle" fill="#f22f46" font-size="16">Twilio</text>
  <text x="285" y="158" text-anchor="middle" fill="#94a3b8" font-size="11">Voice API</text>
  <text x="285" y="178" text-anchor="middle" fill="#94a3b8" font-size="11">SMS API</text>
  <text x="285" y="198" text-anchor="middle" fill="#94a3b8" font-size="11">Webhooks</text>
  
  <!-- Arrow: Twilio → Server -->
  <line x1="355" y1="160" x2="400" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Server -->
  <rect x="405" y="80" width="160" height="160" rx="12" fill="#1a1a2e" stroke="#60a5fa" stroke-width="2" filter="url(#shadow)"/>
  <text x="485" y="115" text-anchor="middle" fill="#60a5fa" font-size="15">Eve Server</text>
  <text x="485" y="138" text-anchor="middle" fill="#94a3b8" font-size="11">Node.js + Express</text>
  <line x1="425" y1="148" x2="545" y2="148" stroke="#1e293b" stroke-width="1"/>
  <text x="485" y="168" text-anchor="middle" fill="#e2e8f0" font-size="11">Call Handler</text>
  <text x="485" y="186" text-anchor="middle" fill="#e2e8f0" font-size="11">Intent Parser</text>
  <text x="485" y="204" text-anchor="middle" fill="#e2e8f0" font-size="11">Appt Booker</text>
  <text x="485" y="222" text-anchor="middle" fill="#e2e8f0" font-size="11">SMS Engine</text>
  
  <!-- Arrow: Server → xAI -->
  <line x1="525" y1="240" x2="570" y2="290" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- xAI Grok -->
  <rect x="575" y="270" width="140" height="80" rx="12" fill="#1a1a2e" stroke="#1da1f2" stroke-width="2" filter="url(#shadow)"/>
  <text x="645" y="300" text-anchor="middle" fill="#1da1f2" font-size="15">xAI Grok</text>
  <text x="645" y="320" text-anchor="middle" fill="#94a3b8" font-size="11">Realtime API</text>
  <text x="645" y="338" text-anchor="middle" fill="#94a3b8" font-size="11">Voice → Text</text>
  
  <!-- Arrow: Server → Supabase -->
  <line x1="405" y1="160" x2="340" y2="300" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Supabase -->
  <rect x="215" y="290" width="140" height="80" rx="12" fill="#1a1a2e" stroke="#3ecf8e" stroke-width="2" filter="url(#shadow)"/>
  <text x="285" y="320" text-anchor="middle" fill="#3ecf8e" font-size="15">Supabase</text>
  <text x="285" y="340" text-anchor="middle" fill="#94a3b8" font-size="11">PostgreSQL</text>
  <text x="285" y="358" text-anchor="middle" fill="#94a3b8" font-size="11">Calls + Bookings</text>
  
  <!-- Arrow: Server → SMS -->
  <line x1="525" y1="240" x2="640" y2="190" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="5,3"/>
  
  <!-- SMS Label -->
  <text x="610" y="180" text-anchor="middle" fill="#34b7f1" font-size="11">SMS Confirm</text>
  
  <!-- Footer: Phone -->
  <rect x="575" y="365" width="140" height="50" rx="25" fill="#1e3a5f" filter="url(#shadow)" stroke="#34b7f1" stroke-width="1"/>
  <text x="645" y="390" text-anchor="middle" fill="#34b7f1" font-size="11">✉️ SMS to Caller</text>
  <text x="645" y="405" text-anchor="middle" fill="#64748b" font-size="10">Confirmation Text</text>
  
  <!-- Legend -->
  <rect x="40" y="380" width="160" height="100" rx="8" fill="#1e293b" opacity="0.5"/>
  <text x="55" y="400" fill="#94a3b8" font-size="11">Legend</text>
  <rect x="55" y="412" width="12" height="12" fill="#f22f46" rx="2"/>
  <text x="75" y="423" fill="#94a3b8" font-size="10">Twilio / SMS</text>
  <rect x="55" y="432" width="12" height="12" fill="#60a5fa" rx="2"/>
  <text x="75" y="443" fill="#94a3b8" font-size="10">Application</text>
  <rect x="55" y="452" width="12" height="12" fill="#1da1f2" rx="2"/>
  <text x="75" y="463" fill="#94a3b8" font-size="10">AI / External</text>
</svg>
